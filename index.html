    :root {
      --accent: #00d4aa;
      --accent2: #ff6b9d;
      --ring-work: #00d4aa;
      --ring-break: #74b9ff;
      --card-bg: rgba(255, 255, 255, 0.07);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #e8f4f8;
      --text-muted: rgba(232, 244, 248, 0.5);

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', 'Hiragino Kaku Gothic ProN', sans-serif;
      min-height: 100vh;
      color: var(--text);

      50%  { background-position: 100% 50%; }

      z-index: 0;

    .card {

<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>RIRI 🌺 ポモドーロ タイム</h1>
      <p>癒しの音楽で、もくもく集中 🏝️</p>
    </div>

    <!-- Timer Card -->
    <div class="card timer-card">
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="setMode(25, 5, this)">25 / 5 分</button>
        <button class="mode-tab" onclick="setMode(50, 10, this)">50 / 10 分</button>
      </div>

      <div class="timer-wrapper">
        <svg class="timer-svg" viewBox="0 0 200 200">
          <circle class="ring-bg"       cx="100" cy="100" r="90"/>
          <circle class="ring-progress" cx="100" cy="100" r="90" id="timerRing"/>
        </svg>
        <div class="timer-display">
          <div class="timer-time" id="timer">25:00</div>
          <div class="timer-phase" id="phase">集中タイム</div>
        </div>
      </div>

      <div id="message"></div>

      <div class="btn-group">
        <button class="btn btn-primary" id="startBtn"  onclick="startLoop()">▶ スタート</button>
        <button class="btn btn-pause"   id="pauseBtn"  onclick="pauseLoop()" style="display:none">⏸ 一時停止</button>
        <button class="btn btn-secondary"              onclick="resetLoop()">↺ リセット</button>
      </div>

      <div class="session-info">
        <div class="session-stat">
          <div class="value" id="sessionCount">0</div>
          <div class="label">セッション</div>
        </div>
        <div class="session-stat">
          <div class="value" id="focusTime">0</div>
          <div class="label">集中 (分)</div>
        </div>
      </div>
    </div>

    <!-- BGM Card -->
    <div class="card bgm-card">
      <span class="card-label">🎵 BGM を選ぶ</span>
      <div class="bgm-controls">
        <select id="musicSelect" onchange="updateBGM()">
          <option value="">読み込み中...</option>
        </select>
        <button class="btn-icon" id="shuffleBtn" onclick="toggleShuffle()" title="シャッフル">🔀</button>
        <button class="btn-icon" onclick="playNext()" title="次の曲">⏭</button>
      </div>
      <div class="now-playing" id="nowPlaying">🎶 スタートすると再生されます</div>
      <div class="api-status" id="apiStatus"></div>
    </div>

    <!-- YouTube Embed -->
    <div class="card">
      <div class="embed-wrapper">
        <iframe id="bgmPlayer" allow="autoplay"></iframe>
      </div>
    </div>

    <!-- About -->
    <div class="card about-card">
      <strong>ポモドーロ・テクニックとは？</strong><br />
      25分集中＋5分休憩を1セットとして繰り返す、シンプルで効果的な時間管理法です。
      集中タイマーと癒しのBGMで「もくもく作業」をサポートします 🎺<br /><br />
      <span style="font-size:0.78rem">💡 Space キーでスタート / 一時停止できます</span>
    </div>

    <!-- Footer -->
    <div class="card footer">
      <p>RIRIのSNSをフォローしてね ✨</p>
      <div class="social-links">
        <a class="youtube-btn" href="https://youtube.com/@riri8bgm"    target="_blank">▶ YouTube</a>
        <a class="x-btn"       href="https://x.com/riri8bgm"           target="_blank">𝕏 X</a>
        <a class="insta-btn"   href="https://instagram.com/riri8bgm"   target="_blank">📷 Instagram</a>
        <a class="tiktok-btn"  href="https://www.tiktok.com/@riri8bgm?lang=ja-JP" target="_blank">♪ TikTok</a>
      </div>
    </div>

  </div>

  <script>
    // ============================================================
    // YouTube API 設定（BGM自動取得）
    //
    // BGMをチャンネルから自動取得するには：
    //   1. Google Cloud Console で「YouTube Data API v3」を有効化
    //   2. APIキーを作成し YT_API_KEY に貼り付ける
    //      ※ ドメイン riri8.kkpwebninja.com に制限することを推奨
    //   3. YT_CHANNEL_ID に @riri8bgm のチャンネルID（UCで始まる）を設定
    //      ※ youtube.com/@riri8bgm を開き、ページソースで "channelId" を検索
    //
    // 未設定の場合はフォールバックリストを使用します
    // ============================================================
    const YT_API_KEY    = '';  // 例: 'AIzaSyABC123...'
    const YT_CHANNEL_ID = '';  // 例: 'UCxxxxxxxxxxxxxxxxxxxxxxxx'

    const FALLBACK_VIDEOS = [
      { id: 'xvcXZbvYf0s', title: '🐚 作業用BGM 1'  },
      { id: 'W0lUBVcvJiw', title: '🐚 作業用BGM 2'  },
      { id: 'nlzxWWjB-ik', title: '🐚 作業用BGM 3'  },
      { id: 'Fdp4u_SUjKE', title: '🐚 作業用BGM 4'  },
      { id: 'o-wCYm_Pm6A', title: '🐚 作業用BGM 5'  },
      { id: 'HoljfuP1POQ', title: '🐚 作業用BGM 6'  },
      { id: 'rWyX16RTMgk', title: '🐚 作業用BGM 7'  },
      { id: 'lY3x33Q9p7Y', title: '🐚 作業用BGM 8'  },
      { id: 'zoKoxAws_qg', title: '🐚 作業用BGM 9'  },
      { id: 'Y5mkp8pRuug', title: '🐚 作業用BGM 10' },
      { id: 'BYra5__dZt8', title: '🐚 作業用BGM 11' },
      { id: 'HmYecNjo-YU', title: '🐚 作業用BGM 12' },
      { id: 'QLDlN5QeFJY', title: '🐚 作業用BGM 13' },
      { id: '_ES-qbX3PZw', title: '🐚 作業用BGM 14' },
      { id: 'gum_BK-TaNc', title: '🐚 作業用BGM 15' },
      { id: 'aR2wgXX1LKw', title: '🐚 作業用BGM 16' },
      { id: '8YhHNFx6IG4', title: '🐚 作業用BGM 17' },
      { id: 'fdvMXXki5aI', title: '🐚 作業用BGM 18' },
      { id: '_daHDiMOhUg', title: '🐚 作業用BGM 19' },
      { id: 'JHgbgOtCh6o', title: '🐚 作業用BGM 20' },
      { id: 'EuEzwLm1rVg', title: '🐚 作業用BGM 21' },
      { id: 'sO3IO8ITQbk', title: '🐚 作業用BGM 22' },
      { id: '7Col7jbU58I', title: '🐚 作業用BGM 23' },
      { id: 'jwls6XgOqeI', title: '🐚 作業用BGM 25' },
      { id: 'pvB3cN41kLg', title: '🐚 作業用BGM 26' },
      { id: '-0BGU5JNgx4', title: '🐚 作業用BGM 27' },
      { id: 'tn8xWxJlTHk', title: '🐚 作業用BGM 28' },
      { id: 'IUtaYi5tc7Q', title: '🐚 作業用BGM 29' },
      { id: 'ftyC1THMVPU', title: '🐚 作業用BGM 30' },
      { id: '1CaYmGW0JRk', title: '🐚 作業用BGM 31' },
      { id: 'PX9qcl3O4ko', title: '🐚 作業用BGM 32' },
      { id: 'txOSbA_gdAM', title: '🐚 作業用BGM 33' },
      { id: 'ireQV7GrQzk', title: '🐚 作業用BGM 34' },
      { id: 'KbY08F0C8Wg', title: '🐚 作業用BGM 35' },
      { id: 'k4811LfeE88', title: '🐚 作業用BGM 36' },
      { id: 'cYZSt-864jM', title: '🐚 作業用BGM 37' },
      { id: 'VQHr0XkRoa0', title: '🐚 作業用BGM 38' },
      { id: 'P6oqA-C5PHE', title: '🐚 作業用BGM 39' },
      { id: 'Iud9PZCxIFg', title: '🐚 作業用BGM 40' },
      { id: 'I8iyRjqQRaQ', title: '🐚 作業用BGM 41' },
    ];

    // ============================================================
    // State
    // ============================================================
    let timerInterval;
    let time        = 1500;
    let running     = false;
    let paused      = false;
    let isWork      = true;
    let workDuration  = 1500;
    let breakDuration = 300;
    let sessionCount  = 0;
    let shuffleMode   = false;
    const CIRCUMFERENCE = 2 * Math.PI * 90; // 565.48

    // ============================================================
    // Init
    // ============================================================
    window.addEventListener('load', () => {
      loadBGMList();
      updateDisplay();
      updateRing();
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !['INPUT','SELECT','BUTTON','TEXTAREA'].includes(e.target.tagName)) {
        e.preventDefault();
        if (!running)      startLoop();
        else if (paused)   resumeLoop();
        else               pauseLoop();
      }
    });

    // ============================================================
    // BGM 自動取得
    // ============================================================
    async function loadBGMList() {
      if (!YT_API_KEY || !YT_CHANNEL_ID) {
        populateSelect(FALLBACK_VIDEOS);
        return;
      }

      const statusEl = document.getElementById('apiStatus');
      statusEl.textContent = '⏳ BGMリストを取得中...';
      statusEl.className = 'api-status loading';

      try {
        // チャンネルのアップロードプレイリストIDを取得
        const chRes  = await fetch(
          `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${YT_CHANNEL_ID}&key=${YT_API_KEY}`
        );
        const chData = await chRes.json();
        const uploadsId = chData.items[0].contentDetails.relatedPlaylists.uploads;

        // プレイリストから動画を全取得（ページネーション対応、最大200件）
        const videos = [];
        let pageToken = '';
        do {
          const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${uploadsId}&key=${YT_API_KEY}${pageToken ? '&pageToken=' + pageToken : ''}`;
          const res  = await fetch(url);
          const data = await res.json();
          for (const item of data.items) {
            videos.push({
              id:    item.snippet.resourceId.videoId,
              title: item.snippet.title,
            });
          }
          pageToken = data.nextPageToken || '';
        } while (pageToken && videos.length < 200);

        populateSelect(videos);
        statusEl.textContent = `✅ ${videos.length}曲を取得しました`;
        statusEl.className = 'api-status success';
        setTimeout(() => { statusEl.textContent = ''; }, 4000);

      } catch (err) {
        console.error('YouTube API error:', err);
        populateSelect(FALLBACK_VIDEOS);
        statusEl.textContent = '⚠️ API取得失敗 — 保存済みリストを使用中';
        statusEl.className = 'api-status error';
      }
    }

    function populateSelect(videos) {
      const sel = document.getElementById('musicSelect');
      sel.innerHTML = '';
      videos.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.id;
        opt.textContent = v.title;
        sel.appendChild(opt);
      });
    }

    // ============================================================
    // Timer
    // ============================================================
    function updateDisplay() {
      const m = Math.floor(time / 60);
      const s = time % 60;
      const txt = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      document.getElementById('timer').textContent = txt;
      document.title = `${txt} — RIRI ポモドーロ`;
    }

    function updateRing() {
      const total    = isWork ? workDuration : breakDuration;
      const offset   = CIRCUMFERENCE * (1 - time / total);
      const ring     = document.getElementById('timerRing');
      ring.style.strokeDashoffset = offset;
      ring.style.stroke = isWork ? 'var(--ring-work)' : 'var(--ring-break)';
    }

    function setMode(workMin, breakMin, btn) {
      if (running && !paused) return;
      workDuration  = workMin * 60;
      breakDuration = breakMin * 60;
      time   = workDuration;
      isWork = true;
      updateDisplay();
      updateRing();
      document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
    }

    function startLoop() {
      if (running) return;
      running = true;
      paused  = false;
      isWork  = true;
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('pauseBtn').style.display = '';
      requestNotificationPermission();
      startPhase();
    }

    function pauseLoop() {
      if (!running || paused) return;
      paused = true;
      clearInterval(timerInterval);
      const btn = document.getElementById('pauseBtn');
      btn.textContent = '▶ 再開';
      btn.onclick = resumeLoop;
    }

    function resumeLoop() {
      if (!paused) return;
      paused = false;
      const btn = document.getElementById('pauseBtn');
      btn.textContent = '⏸ 一時停止';
      btn.onclick = pauseLoop;
      tick();
    }

    function resetLoop() {
      clearInterval(timerInterval);
      time    = workDuration;
      running = false;
      paused  = false;
      isWork  = true;
      updateDisplay();
      updateRing();
      document.body.className = '';
      document.getElementById('bgmPlayer').src        = '';
      document.getElementById('message').textContent  = '';
      document.getElementById('phase').textContent    = '集中タイム';
      document.getElementById('nowPlaying').innerHTML = '🎶 スタートすると再生されます';
      document.getElementById('startBtn').style.display = '';
      document.getElementById('pauseBtn').style.display = 'none';
      const pb = document.getElementById('pauseBtn');
      pb.textContent = '⏸ 一時停止';
      pb.onclick = pauseLoop;
      document.title = 'RIRI ポモドーロ タイム 🌴';
    }

    function startPhase() {
      clearInterval(timerInterval);
      document.body.className = isWork ? '' : 'break-mode';
      time = isWork ? workDuration : breakDuration;
      updateDisplay();
      updateRing();

      const workMin  = workDuration / 60;
      const breakMin = breakDuration / 60;
      document.getElementById('phase').textContent   = isWork ? '集中タイム' : '休憩タイム';
      document.getElementById('message').textContent = isWork
        ? `🌺 集中タイム開始！${breakMin}分後に休憩です`
        : `🏖️ お疲れさま！${breakMin}分間休憩しましょう`;

      if (isWork) {
        if (shuffleMode) shuffleSelect();
        updateBGM();
      } else {
        document.getElementById('bgmPlayer').src        = '';
        document.getElementById('nowPlaying').innerHTML = '🏖️ 休憩中...';
      }

      tick();
    }

    function tick() {
      timerInterval = setInterval(() => {
        if (time > 0) {
          time--;
          updateDisplay();
          updateRing();
        } else {
          clearInterval(timerInterval);
          if (isWork) {
            sessionCount++;
            document.getElementById('sessionCount').textContent = sessionCount;
            document.getElementById('focusTime').textContent    = sessionCount * (workDuration / 60);
            sendNotification('🏖️ 休憩タイム！', `${workDuration/60}分間お疲れさまでした。休憩しましょう。`);
          } else {
            sendNotification('🌺 集中タイム！', `休憩終了！${workDuration/60}分間集中しましょう。`);
          }
          isWork = !isWork;
          startPhase();
        }
      }, 1000);
    }

    // ============================================================
    // BGM
    // ============================================================
    function updateBGM() {
      const sel     = document.getElementById('musicSelect');
      const videoId = sel.value;
      if (!videoId) return;
      const title   = sel.options[sel.selectedIndex]?.text || '';
      document.getElementById('bgmPlayer').src =
        `https://www.youtube.com/embed/${videoId}?autoplay=1&loop=1&playlist=${videoId}`;
      document.getElementById('nowPlaying').innerHTML = `▶ <span>${title}</span>`;
    }

    function toggleShuffle() {
      shuffleMode = !shuffleMode;
      document.getElementById('shuffleBtn').classList.toggle('active', shuffleMode);
    }

    function shuffleSelect() {
      const sel = document.getElementById('musicSelect');
      sel.selectedIndex = Math.floor(Math.random() * sel.options.length);
    }

    function playNext() {
      const sel = document.getElementById('musicSelect');
      if (shuffleMode) {
        shuffleSelect();
      } else {
        sel.selectedIndex = (sel.selectedIndex + 1) % sel.options.length;
      }
      updateBGM();
    }

    // ============================================================
    // Notifications
    // ============================================================
    function requestNotificationPermission() {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    }

    function sendNotification(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, { body, icon: 'https://riri8.kkpwebninja.com/image/card.png' });
      }
    }

    updateDisplay();
  </script>
</body>
</html>
